# OpenWrt 自动云编译工作流 - JDC AX1800
# 作者: 李杰
# 功能: 编译 JDC AX1800 固件

name: Build OpenWrt Firmware - JDC AX1800

# 触发条件
on:
  # 手动触发
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否启用SSH调试 (true/false)'
        required: false
        default: 'false'
        type: string
  
  # 定时触发 (每周日凌晨3点)
  schedule:
    - cron: '0 3 * * 0'
  
  # 代码推送触发
  push:
    branches:
      - main
      - master
    paths:
      - 'configs/jdc-ax1800.config'
      - '.github/workflows/build-jdc-ax1800.yml'
      - 'scripts/**'

# 权限配置
permissions:
  contents: write

# 环境变量
env:
  # 源码仓库地址
  REPO_URL: https://github.com/coolsnowwolf/lede
  # 源码分支
  REPO_BRANCH: master
  # 固件发布配置
  RELEASE_TAG: OpenWrt-AutoBuild-${{ github.run_number }}
  RELEASE_NAME: OpenWrt 自动编译固件 ${{ github.run_number }}
  # 编译配置
  TZ: Asia/Shanghai
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: configs/.config
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  DEVICE: jdc-ax1800

jobs:
  # 编译阶段
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 更新软件包列表
          sudo apt-get update
          # 安装编译依赖
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build \
            p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
            vim wget xmlto xxd zlib1g-dev
          # 清理
          sudo apt-get clean
          # 设置时区
          sudo timedatectl set-timezone "$TZ"
          # 设置git
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: 克隆OpenWrt源码
        run: |
          # 克隆源码仓库
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          # 显示源码信息
          cd openwrt
          echo "源码仓库: $REPO_URL"
          echo "分支: $REPO_BRANCH"
          echo "最新提交:"
          git log --oneline -1

      - name: 加载自定义feeds
        run: |
          cd openwrt
          # 第三方插件仓库已在 DIY Part 1 脚本中添加
          # 显示feeds配置
          cat feeds.conf.default

      - name: 执行DIY脚本 (Part 1)
        run: |
          cd openwrt
          # 执行第一部分自定义脚本
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 执行DIY脚本 (Part 2)
        run: |
          cd openwrt
          # 执行第二部分自定义脚本
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 加载设备配置文件
        run: |
          cd openwrt
          # 根据设备选择对应的配置文件
          case "${{ env.DEVICE }}" in
            jdc-ax1800)
              CONFIG_FILE="$GITHUB_WORKSPACE/configs/jdc-ax1800.config"
              ;;
            *)
              echo "未知设备: ${{ env.DEVICE }}"
              exit 1
              ;;
          esac
          
          # 复制配置文件
          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" .config
            echo "已加载配置文件: $CONFIG_FILE"
            
            # 验证配置文件内容
            echo "验证配置文件内容..."
            if grep -q "CONFIG_TARGET_qualcommax_ipq60xx" $CONFIG_FILE; then
              echo "✓ 配置文件包含正确的设备配置: CONFIG_TARGET_qualcommax_ipq60xx"
            else
              echo "✗ 错误: 配置文件缺少正确的设备配置"
              cat $CONFIG_FILE | grep "CONFIG_TARGET_"
              exit 1
            fi
          else
            echo "配置文件不存在: $CONFIG_FILE"
            exit 1
          fi
          
          # 清理旧配置缓存（不使用distclean，避免删除必要文件）
          echo "清理旧配置缓存..."
          make cleanconfig > /dev/null 2>&1 || true
          make clean > /dev/null 2>&1 || true
          
          # 复制配置文件
          echo "复制配置文件..."
          cp "$CONFIG_FILE" .config
          echo "配置文件内容:"
          cat $CONFIG_FILE | grep "CONFIG_TARGET_"
          
          # 验证配置文件是否正确复制
          echo "验证配置文件复制..."
          if [ -f ".config" ]; then
            echo "✓ 配置文件已成功复制"
            cat .config | grep "CONFIG_TARGET_"
          else
            echo "✗ 错误: 配置文件未成功复制"
            exit 1
          fi
          
          # 展开配置
          echo "展开配置..."
          make defconfig
          
          # 显示完整的配置内容（用于调试）
          echo "展开后的配置文件内容:"
          cat .config | grep "CONFIG_TARGET_"
          
          # 验证配置是否正确应用
          echo "验证目标架构配置..."
          if grep -q "CONFIG_TARGET_qualcommax=y" .config; then
            echo "✓ 目标架构已正确配置为 qualcommax"
            # 再次验证设备配置
            if grep -q "CONFIG_TARGET_qualcommax_ipq60xx" .config; then
              echo "✓ 设备配置已正确应用: jdc-ax1800"
            else
              echo "✗ 错误: 设备配置未正确应用"
              grep "CONFIG_TARGET_qualcommax" .config
              exit 1
            fi
          else
            echo "✗ 错误: 目标架构配置不正确"
            echo "当前配置中的目标架构:"
            grep "CONFIG_TARGET_" .config | head -30
            exit 1
          fi
          
          # 显示完整的目标配置
          echo "完整的目标配置:"
          grep "CONFIG_TARGET_" .config | grep -v "#"

      - name: 下载依赖包
        run: |
          cd openwrt
          # 添加下载重试机制
          for i in {1..3}; do
            echo "第 $i 次尝试下载依赖包..."
            make download -j8 && break || sleep 30
          done
          # 验证下载
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 启用SSH调试 (可选)
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event.inputs.ssh == 'true' }}
        with:
          limit-access-to-actor: true

      - name: 开始编译固件
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          # 开始编译
          make -j$(nproc) || make -j1 || make -j1 V=s
          
          # 获取编译结果信息
          echo "status=success" >> $GITHUB_OUTPUT
          
          # 根据设备确定目标架构目录
          case "${{ env.DEVICE }}" in
            jdc-ax1800)
              TARGET_DIR="bin/targets/ipq60xx/generic/"
              ;;
            *)
              TARGET_DIR="bin/targets/"
              ;;
          esac
          
          # 查找生成的固件文件
          echo "查找固件文件在: $TARGET_DIR"
          FIRMWARE_PATH=$(find $TARGET_DIR -type f \( -name "*.bin" -o -name "*.img" -o -name "*.gz" \) 2>/dev/null | head -20)
          echo "找到以下固件文件:"
          echo "$FIRMWARE_PATH"
          
          # 验证是否找到固件
          if [ -z "$FIRMWARE_PATH" ]; then
            echo "✗ 错误: 未找到任何固件文件"
            echo "检查所有目标目录:"
            find bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.gz" \) | head -20
            exit 1
          fi
          
          # 保存固件路径
          echo "FIRMWARE_PATH<<EOF" >> $GITHUB_ENV
          echo "$FIRMWARE_PATH" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 整理固件文件
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt
          # 创建固件输出目录
          mkdir -p $GITHUB_WORKSPACE/firmware/${{ env.DEVICE }}
          
          # 根据设备确定目标架构目录
          case "${{ env.DEVICE }}" in
            jdc-ax1800)
              TARGET_DIR="bin/targets/ipq60xx/generic/"
              ;;
            *)
              TARGET_DIR="bin/targets/"
              ;;
          esac
          
          # 复制固件文件
          echo "从 $TARGET_DIR 复制固件文件..."
          find $TARGET_DIR -type f \( -name "*sysupgrade*.bin" -o -name "*factory*.bin" -o -name "*.img.gz" \) -exec cp {} $GITHUB_WORKSPACE/firmware/${{ env.DEVICE }}/ \;
          
          # 复制构建信息
          echo "设备: ${{ env.DEVICE }}" > $GITHUB_WORKSPACE/firmware/${{ env.DEVICE }}/buildinfo.txt
          echo "编译时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_WORKSPACE/firmware/${{ env.DEVICE }}/buildinfo.txt
          echo "源码版本: $(git rev-parse --short HEAD)" >> $GITHUB_WORKSPACE/firmware/${{ env.DEVICE }}/buildinfo.txt
          
          # 显示整理后的文件
          echo "整理后的固件文件:"
          ls -lh $GITHUB_WORKSPACE/firmware/${{ env.DEVICE }}/

      - name: 上传固件到Artifacts
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-${{ env.DEVICE }}-${{ github.run_number }}
          path: |
            firmware/${{ env.DEVICE }}/*
          if-no-files-found: error

      - name: 整理发布文件
        if: steps.compile.outputs.status == 'success'
        run: |
          # 创建发布目录
          mkdir -p release
          
          # 移动固件到发布目录
          cp -r $GITHUB_WORKSPACE/firmware/${{ env.DEVICE }}/* release/
          
          # 创建发布说明
          cat > release/release_notes.txt << 'EOF'
          OpenWrt 自动编译固件
          ===================
          
          编译时间: $(date '+%Y-%m-%d %H:%M:%S')
          源码仓库: coolsnowwolf/lede
          插件仓库: wwz09/QCA-Package
          
          支持的设备:
          - JDC AX1800
          
          默认包含功能:
          - WiFi无线功能
          - 常用网络插件
          - 第三方插件包
          
          固件说明:
          - factory.bin:  factory固件，用于首次刷机
          - sysupgrade.bin: 升级固件，用于系统升级
          
          刷机说明:
          1. 首次刷机请使用 factory 固件
          2. 系统升级请使用 sysupgrade 固件
          3. 刷机前请备份配置
          4. 刷机有风险，请谨慎操作
          
          EOF
          
          # 显示发布文件
          echo "发布文件列表:"
          ls -lh release/

      - name: 创建GitHub Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            ## OpenWrt 自动编译固件
            
            ### 编译信息
            - **编译时间**: ${{ github.event.repository.updated_at }}
            - **源码仓库**: [coolsnowwolf/lede](https://github.com/coolsnowwolf/lede)
            - **插件仓库**: [wwz09/QCA-Package](https://github.com/wwz09/QCA-Package)
            - **工作流运行**: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### 支持的设备
            - JDC AX1800
            
            ### 默认功能
            - ✅ WiFi无线功能
            - ✅ 常用网络插件
            - ✅ 第三方QCA插件包
            
            ### 固件说明
            | 文件类型 | 用途 |
            |---------|------|
            | `*factory.bin` | 首次刷机使用 |
            | `*sysupgrade.bin` | 系统升级使用 |
            
            ### 刷机提示
            1. ⚠️ 首次刷机请使用 factory 固件
            2. 🔄 系统升级请使用 sysupgrade 固件
            3. 💾 刷机前请备份重要配置
            4. ⚡ 刷机过程中请勿断电
            
            ### 注意事项
            - 本固件为自动编译生成，仅供测试使用
            - 刷机有风险，请谨慎操作
            - 使用前请仔细阅读相关文档
          files: |
            release/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10
